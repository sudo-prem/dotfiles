# Prefix
unbind C-b
set -g prefix C-a
# Press Ctrl-a twice to send a literal Ctrl-a (e.g. shell "beginning of line").
bind C-a send-prefix

# Core behaviour
set  -g mouse on
set  -g history-limit 3000
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g focus-events on
set  -sg escape-time 10
set  -g  status-interval 1
setw -g mode-keys vi
set  -g status-keys emacs

# True color
set  -g  default-terminal "tmux-256color"
set  -as terminal-features ",*:RGB"

# Clipboard via OSC 52
set  -g set-clipboard on

# Reload config
bind C-r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Splits
bind -n M-h split-window -hb -c "#{pane_current_path}"
bind -n M-l split-window -h  -c "#{pane_current_path}"
bind -n M-k split-window -vb -c "#{pane_current_path}"
bind -n M-j split-window -v  -c "#{pane_current_path}"

# Window switching
bind Tab   next-window
bind BTab  previous-window

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Zoom & rotate
bind z resize-pane -Z
bind o rotate-window

# Resize mode
bind r switch-client -T resize
bind -T resize h resize-pane -L 1 \; switch-client -T resize
bind -T resize j resize-pane -D 1 \; switch-client -T resize
bind -T resize k resize-pane -U 1 \; switch-client -T resize
bind -T resize l resize-pane -R 1 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize Enter  switch-client -T root

# New window
bind t new-window -c "#{pane_current_path}"

# Close window
bind w confirm-before -p "kill window #W? (y/n)" kill-window

# Rename window
bind R command-prompt -I "#W" "rename-window -- '%%'"

# Move window mode
bind m switch-client -T movetab
bind -T movetab h swap-window -d -t -1 \; switch-client -T movetab
bind -T movetab j swap-window -d -t -1 \; switch-client -T movetab
bind -T movetab k swap-window -d -t +1 \; switch-client -T movetab
bind -T movetab l swap-window -d -t +1 \; switch-client -T movetab
bind -T movetab Escape switch-client -T root
bind -T movetab Enter  switch-client -T root

#  Copy Mode
bind c copy-mode
# prefix [ also works (tmux default). Inside copy mode: vi keys.
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# tmux has no fuzzy palette; the command prompt is the closest analogue.
bind Space command-prompt

# Theme - Tokyo Night
# Dim inactive panes
setw -g window-style        "fg=#737aa2,bg=default"
setw -g window-active-style "fg=#c0caf5,bg=default"

# Pane borders
set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages & copy-mode selection
set -g message-style "bg=#283457,fg=#c0caf5"
set -g mode-style    "bg=#283457,fg=#c0caf5"

# Status bar
set -g status-position bottom
set -g status-justify  left
set -g status-style    "bg=default,fg=#c0caf5"
set -g status-left-length  60
set -g status-right-length 90

# Left: session name + active key-table indicator (resize / movetab),
set -g status-left "#[fg=#f7768e,bold]  sudo-term-#S #[fg=#7dcfff]#{?#{!=:#{client_key_table},root},[#{client_key_table}] ,}#[fg=#414868]| "

# Window list
set -g window-status-separator ""
set -g window-status-format         "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[default]"

# Right: current working directory (basename) + foreground command,
set -g status-right "#[fg=#e0af68]  #{b:pane_current_path} #[fg=#414868]| #[fg=#9ece6a]  #{pane_current_command} "
